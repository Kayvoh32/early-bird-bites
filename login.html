<script>
  const params = new URLSearchParams(location.search);
  const role = params.get('role') || 'staff';
  document.getElementById('roleInput').value = role;
  const labels = {cashier:'🧾 Cashier Login',manager:'📊 Manager Login',staff:'👤 Staff Login'};
  document.getElementById('roleLabel').textContent = labels[role] || labels.staff;
  if (params.get('error')) document.getElementById('loginError').classList.add('show');
  document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in...'; btn.disabled = true;
  });
</script>
